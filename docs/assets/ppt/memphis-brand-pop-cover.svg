<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">孟菲斯品牌记忆演示 PPT 封面</title>
  <desc id="desc">明快品牌视觉风格 PPT 封面。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff7ef"/>
      <stop offset="1" stop-color="#f4e6dd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="30" stdDeviation="40" flood-color="#402b24" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1250" cy="190" r="116" fill="#ef7048"/>
  <circle cx="1370" cy="642" r="84" fill="#3fbfc2"/>
  <rect x="127" y="636" width="190" height="190" rx="36" fill="#ffd15c" transform="rotate(-10 222 731)"/>
  <path d="M1012 156l88 42-88 42-88-42z" fill="#2d211c"/>
  <g filter="url(#shadow)">
    <rect x="170" y="118" width="1260" height="664" rx="34" fill="#fffaf7" opacity=".86"/>
    <path d="M260 230c48 0 48 38 96 38s48-38 96-38 48 38 96 38" fill="none" stroke="#ef7048" stroke-width="9" stroke-linecap="round"/>
    <text x="260" y="365" fill="#2d211c" font-family="PingFang SC, Noto Sans SC, Microsoft YaHei, sans-serif" font-size="90" font-weight="600">PPT 也可以有</text>
    <text x="260" y="475" fill="#2d211c" font-family="PingFang SC, Noto Sans SC, Microsoft YaHei, sans-serif" font-size="90" font-weight="600">品牌记忆点</text>
    <text x="264" y="575" fill="#746a64" font-family="PingFang SC, Noto Sans SC, Microsoft YaHei, sans-serif" font-size="34">看一眼，就记住你的项目。</text>
    <text x="264" y="660" fill="#ef7048" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" letter-spacing="4">MEMPHIS BRAND POP</text>
    <rect x="1128" y="626" width="190" height="70" rx="35" fill="#2d211c"/>
    <text x="1223" y="671" text-anchor="middle" fill="#fff8f1" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">PPTX</text>
  </g>
</svg>
